# fly.toml app configuration file generated for filter-fyi-backend on 2026-05-17T14:45:16+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'filter-fyi-backend'
primary_region = 'fra'

[build]

[env]
  DATA_DIR = '/data'

[[mounts]]
  source = 'filter_fyi_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  # Edge backstop. The app-level bot.concurrency semaphore (default 8) is the
  # real guard on heavy work; these stop a burst from parking dozens of
  # connections on a 1 GB box (which previously soaked worker slots → OOM /
  # 25s timeouts — see OPERATIONS.md runbook). Raise after a VM bump.
  [http_service.concurrency]
    type = 'requests'
    hard_limit = 20
    soft_limit = 10

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 1024
