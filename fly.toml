# Fly.io config — research-companion / filter.fyi backend.
# After editing this file, `fly deploy` from this directory.
#
# Before the first deploy:
#   fly launch --no-deploy --name filter-fyi-backend --region fra
#   fly volume create filter_fyi_data --region fra --size 3
#   fly secrets set ANTHROPIC_API_KEY=... TELEGRAM_TOKEN=... FILTER_FYI_TRY_SECRET=...
#   # Optional, for inbound email + production webhook:
#   fly secrets set MAILGUN_SIGNING_KEY=...
#   fly secrets set WEBHOOK_URL=https://filter-fyi-backend.fly.dev

app = "filter-fyi-backend"
primary_region = "fra"

[build]

[env]
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep the machine running: faster-whisper warm + Telegram polling alive.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[mounts]
  source = "filter_fyi_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory = "2gb"
